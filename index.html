<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Pivnica</title>
<link rel="icon" href="pok.ico">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <h1>Poker Pivnica</h1>
  <p class="sub">Výsledky jednotlivých večerov</p>

  <nav>
    <a href="index.html" class="active">Výsledky</a>
    <a href="rebricek.html">Rebríček hráčov</a>
    <a href="blindy.html">Blindy</a>
    <a href="ucast.html">Účasť</a>
  </nav>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Dátum</th>
          <th>1. miesto</th>
          <th>2. miesto</th>
          <th>3. miesto</th>
          <th class="num">Bank</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <footer>Dáta sa ťahajú priamo z Google Sheetu každých pár minút</footer>
</div>

<script src="poker-data.js"></script>
<script>
  const tbody = document.getElementById('rows');

  function formatEUR(n){ return n.toLocaleString('sk-SK') + ' €'; }

  tbody.innerHTML = `<tr><td colspan="5">Načítavam...</td></tr>`;

  loadWeeks()
    .then(weeks => {
      const sorted = [...weeks].sort((a, b) => b.sortKey.localeCompare(a.sortKey));
      tbody.innerHTML = "";

      if (sorted.length === 0){
        tbody.innerHTML = `<tr><td colspan="5">Zatiaľ žiadne odohrané večery.</td></tr>`;
        return;
      }

      sorted.forEach(week => {
        const get = rank => week.results.find(r => r.place === rank);
        const p1 = get(1), p2 = get(2), p3 = get(3);

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${week.date}</td>
          <td>${p1 ? `${p1.name} <span class="gold">(${formatEUR(p1.prize)})</span>` : '-'}</td>
          <td>${p2 ? `${p2.name} (${formatEUR(p2.prize)})` : '-'}</td>
          <td>${p3 ? `${p3.name} (${formatEUR(p3.prize)})` : '-'}</td>
          <td class="num">${formatEUR(week.pot)}</td>
        `;
        tbody.appendChild(tr);
      });
    })
    .catch(err => {
      tbody.innerHTML = `<tr><td colspan="5">Chyba pri načítaní dát: ${err.message}</td></tr>`;
    });
</script>

</body>
</html>
