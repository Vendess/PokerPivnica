<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Menáž</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --felt: #0b3d2e;
    --felt-deep: #062b20;
    --ivory: #f0ead6;
    --ivory-dim: #cfc9b4;
    --gold: #c9a227;
    --chip-red: #b3272d;
    --chip-blue: #2c5f8a;
    --chip-cream: #e8e4d8;
    --line: rgba(240,234,214,0.14);
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    background:
      radial-gradient(circle at 15% -10%, #124a37 0%, transparent 55%),
      radial-gradient(circle at 90% 0%, #0d4433 0%, transparent 45%),
      var(--felt);
    color: var(--ivory);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* subtle felt texture via repeating dots */
  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 5px 5px;
    pointer-events: none;
    z-index: 0;
  }

  header{
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 64px 24px 40px;
    border-bottom: 1px solid var(--line);
  }

  header .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-size: 12px;
    color: var(--gold);
    margin: 0 0 14px;
  }

  header h1{
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin: 0;
    color: var(--ivory);
  }

  header h1 span{ color: var(--gold); }

  header p.sub{
    font-family: 'JetBrains Mono', monospace;
    color: var(--ivory-dim);
    font-size: 14px;
    margin: 14px 0 0;
  }

  main{
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 20px 0;
    position: relative;
    z-index: 1;
  }

  .season-summary{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 4px 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .season-summary .label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ivory-dim);
  }

  .season-summary .value{
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: var(--gold);
    font-weight: 700;
  }

  .week{
    border: 1px solid var(--line);
    border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.025), transparent 40%);
    margin-bottom: 28px;
    overflow: hidden;
  }

  .week-head{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    background: rgba(0,0,0,0.15);
  }

  .week-head .date{
    font-weight: 600;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .week-head .pot{
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
  }

  .week-head .pot .pot-label{
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    display: block;
  }

  .week-head .pot .pot-value{
    font-size: 20px;
    color: var(--gold);
    font-weight: 700;
  }

  .podium{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
  }

  .place{
    background: var(--felt-deep);
    padding: 24px 16px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .chip{
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    position: relative;
    box-shadow: inset 0 0 0 3px rgba(0,0,0,0.25), 0 3px 8px rgba(0,0,0,0.4);
  }

  .chip::before{
    content:"";
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.35);
  }

  .place[data-rank="1"] .chip{ background: var(--chip-red); color: var(--ivory); }
  .place[data-rank="2"] .chip{ background: var(--chip-blue); color: var(--ivory); }
  .place[data-rank="3"] .chip{ background: var(--chip-cream); color: #1a1a1a; }

  .place .rank-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ivory-dim);
  }

  .place .name{
    font-size: 19px;
    font-weight: 600;
  }

  .place .prize{
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--gold);
    font-weight: 700;
  }

  footer{
    text-align: center;
    padding: 40px 20px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ivory-dim);
    position: relative;
    z-index: 1;
  }

  @media (max-width: 560px){
    .podium{ grid-template-columns: 1fr; }
    .week-head{ flex-direction: column; align-items: flex-start; gap: 8px; }
    .week-head .pot{ text-align: left; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Piatkový Turnaj &middot; Domáca Liga</p>
  <h1>Poker <span>Menáž</span></h1>
  <p class="sub">Výsledky jednotlivých hracích večerov</p>
</header>

<main>
  <div class="season-summary">
    <div>
      <span class="label">Odohraných večerov</span>
    </div>
    <div>
      <span class="value" id="weekCount">0</span>
    </div>
  </div>

  <div id="weeks"></div>
</main>

<footer>
  Aktualizované ručne po každom večere &mdash; úprav v <code>data</code> poli v script.js
</footer>

<script src="data.js"></script>
<script>
  const container = document.getElementById('weeks');
  const sorted = [...weeks].sort((a, b) => new Date(b.date) - new Date(a.date));

  document.getElementById('weekCount').textContent = weeks.length;

  function formatEUR(n){
    return n.toLocaleString('sk-SK') + ' €';
  }

  function formatDate(dateStr){
    const d = new Date(dateStr);
    return d.toLocaleDateString('sk-SK', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  sorted.forEach(week => {
    const el = document.createElement('div');
    el.className = 'week';

    const places = [1, 2, 3].map(rank => {
      const p = week.results.find(r => r.place === rank);
      if (!p) return '';
      return `
        <div class="place" data-rank="${rank}">
          <div class="chip">${rank}.</div>
          <span class="rank-label">${rank === 1 ? '1. miesto' : rank === 2 ? '2. miesto' : '3. miesto'}</span>
          <span class="name">${p.name}</span>
          <span class="prize">${formatEUR(p.prize)}</span>
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="week-head">
        <span class="date">${formatDate(week.date)}</span>
        <div class="pot">
          <span class="pot-label">Bank</span>
          <span class="pot-value">${formatEUR(week.pot)}</span>
        </div>
      </div>
      <div class="podium">${places}</div>
    `;

    container.appendChild(el);
  });
</script>

</body>
</html>
