<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebríček hráčov – Poker Pivnica</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <h1>Poker Pivnica</h1>
  <p class="sub">Rebríček hráčov</p>

  <nav>
    <a href="index.html">Výsledky</a>
    <a href="rebricek.html" class="active">Rebríček hráčov</a>
    <a href="blindy.html">Blindy</a>
  </nav>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Hráč</th>
          <th class="num">Účastí</th>
          <th class="num">1. miesto</th>
          <th class="num">2. miesto</th>
          <th class="num">3. miesto</th>
          <th class="num">Spolu vyhraté</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <footer>Počítané automaticky zo všetkých večerov v Google Sheete</footer>
</div>

<script src="poker-data.js"></script>
<script>
  const tbody = document.getElementById('rows');
  function formatEUR(n){ return n.toLocaleString('sk-SK') + ' €'; }

  tbody.innerHTML = `<tr><td colspan="7">Načítavam...</td></tr>`;

  loadWeeks()
    .then(weeks => {
      const players = {};

      weeks.forEach(week => {
        week.results.forEach(r => {
          if (!players[r.name]){
            players[r.name] = { name: r.name, total: 0, played: 0, first: 0, second: 0, third: 0 };
          }
          players[r.name].total += r.prize;
          players[r.name].played += 1;
          if (r.place === 1) players[r.name].first += 1;
          if (r.place === 2) players[r.name].second += 1;
          if (r.place === 3) players[r.name].third += 1;
        });
      });

      const ranked = Object.values(players).sort((a, b) => b.total - a.total);
      tbody.innerHTML = "";

      if (ranked.length === 0){
        tbody.innerHTML = `<tr><td colspan="7">Zatiaľ žiadni hráči.</td></tr>`;
        return;
      }

      ranked.forEach((p, i) => {
        const rankNum = i + 1;
        const medalClass = rankNum <= 3 ? ` medal medal-${rankNum}` : "";
        const tr = document.createElement('tr');
        if (rankNum <= 3) tr.className = `top top-${rankNum}`;
        tr.innerHTML = `
          <td class="rank"><span class="rank-badge${medalClass}">${rankNum}</span></td>
          <td>${p.name}</td>
          <td class="num">${p.played}</td>
          <td class="num">${p.first}</td>
          <td class="num">${p.second}</td>
          <td class="num">${p.third}</td>
          <td class="num gold">${formatEUR(p.total)}</td>
        `;
        tbody.appendChild(tr);
      });
    })
    .catch(err => {
      tbody.innerHTML = `<tr><td colspan="7">Chyba pri načítaní dát: ${err.message}</td></tr>`;
    });
</script>

</body>
</html>
